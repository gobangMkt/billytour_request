<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root {
    --navy: #1A3A6B;
    --navy-deep: #0E2347;
    --cta: #2B85CC;
    --gold: #E8B84B;
    --paper: #F8FAFC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', sans-serif;
    background: #2a2a2a;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px;
  }
  .banner {
    width: 800px;
    height: 600px;
    position: relative;
    overflow: hidden;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 60px;
  }
  .tag {
    display: inline-block;
    align-self: flex-start;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    padding: 9px 20px;
    border-radius: 999px;
    margin-bottom: 28px;
  }
  .head {
    font-size: 62px;
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: -0.04em;
  }
  .head .hl { color: var(--gold); }
  .sub {
    margin-top: 26px;
    font-size: 30px;
    font-weight: 500;
    line-height: 1.5;
    letter-spacing: -0.03em;
    opacity: 0.92;
  }
  .price {
    margin-top: 30px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .price .old {
    font-size: 34px;
    font-weight: 600;
    text-decoration: line-through;
    opacity: 0.55;
  }
  .price .new {
    font-size: 60px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.03em;
  }
  .price .unit { font-size: 30px; font-weight: 700; color: var(--gold); }
  .free {
    margin-top: 22px;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
  }
  .free b {
    color: var(--gold);
    border-bottom: 3px solid var(--gold);
    padding-bottom: 2px;
  }
  .brand {
    position: absolute;
    bottom: 38px;
    right: 56px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.04em;
    opacity: 0.85;
  }
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
  }

  /* A — 혜택형 (메인) */
  #a {
    background: radial-gradient(140% 130% at 85% 10%, #2B85CC 0%, var(--navy) 42%, var(--navy-deep) 100%);
  }
  #a .tag { background: var(--gold); color: var(--navy-deep); }
  #a .glow { width: 360px; height: 360px; background: var(--cta); top: -120px; right: -80px; }

  /* B — 마감 임박 */
  #b {
    background: linear-gradient(135deg, var(--navy-deep) 0%, #142a52 55%, #1f1f2e 100%);
  }
  #b .tag { background: #fff; color: var(--navy-deep); }
  #b .urgent {
    position: absolute; top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--gold), #f5d27e, var(--gold));
  }
  #b .deadline {
    align-self: flex-start;
    margin-bottom: 26px;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.02em;
  }
  #b .glow { width: 320px; height: 320px; background: var(--gold); bottom: -130px; left: -90px; opacity: 0.28; }

  /* C — 가격 완화 (숏츠) */
  #c {
    background: radial-gradient(130% 120% at 15% 90%, #2B85CC 0%, #1f5fa0 45%, var(--navy) 100%);
  }
  #c .tag { background: var(--navy-deep); color: var(--gold); }
  #c .bignum {
    margin-top: 18px;
    font-size: 96px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  #c .bignum small { font-size: 44px; color: #fff; font-weight: 700; }
  #c .glow { width: 340px; height: 340px; background: #fff; top: -110px; left: -70px; opacity: 0.18; }
</style>
</head>
<body>

  <!-- A. 혜택형 (메인) -->
  <div class="banner" id="a">
    <div class="glow"></div>
    <span class="tag">기존 원장님 한정 · 리뉴얼 기념</span>
    <div class="head">빌리투어 영상,<br><span class="hl">다시 찍을 때</span> 됐어요</div>
    <div class="price">
      <span class="old">정가 50만</span>
      <span class="new">40만<span class="unit">원</span></span>
    </div>
    <div class="free">+ 트렌디한 <b>숏폼 1개(10만 상당) 무료</b></div>
    <div class="brand">BILLY TOUR ✦ GLOBAL</div>
  </div>

  <!-- B. 마감 임박 -->
  <div class="banner" id="b">
    <div class="urgent"></div>
    <div class="glow"></div>
    <div class="deadline">⏰ 곧 마감됩니다</div>
    <span class="tag">기존 원장님 전용 혜택</span>
    <div class="head">리뉴얼 재구매<br><span class="hl">40만원</span> 특가</div>
    <div class="free" style="margin-top:30px;">정가 50만 · 숏폼 1개 <b>무료 증정</b></div>
    <div class="brand">BILLY TOUR ✦ GLOBAL</div>
  </div>

  <!-- C. 가격 완화 (숏츠) -->
  <div class="banner" id="c">
    <div class="glow"></div>
    <span class="tag">추가 촬영 없이, 가볍게 시작</span>
    <div class="head">숏폼 1개,</div>
    <div class="bignum">단 10만<small>원</small></div>
    <div class="sub">기존 영상 그대로 · 유튜브 Shorts + 인스타 릴스 동시 업로드</div>
    <div class="brand">BILLY TOUR ✦ SHORTS</div>
  </div>

</body>
</html>
